services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       transfers
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      # Migrations are applied automatically on first start.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d transfers"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Unit tests (no DB required) ────────────────────────────────────────────
  unit-test:
    build:
      context: .
      target: unit-test
    # No dependency on postgres; these tests use the in-memory repo.

  # ── Integration tests (require postgres) ───────────────────────────────────
  integration-test:
    build:
      context: .
      target: integration-test
    environment:
      DATABASE_URL: postgres://app:secret@postgres:5432/transfers?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  # ── Demo binary against Postgres ───────────────────────────────────────────
  demo:
    build:
      context: .
      target: prod
    environment:
      DATABASE_URL: postgres://app:secret@postgres:5432/transfers?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
